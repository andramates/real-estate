<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="hero-page">
    <div class="hero-card" style="grid-template-columns: 1fr;">
        <main class="hero-main">
            <header class="hero-topbar">
                <div>
                    <h1>Admin Dashboard</h1>
                    <p>Monitorizează proprietățile și gestionează aprobările din platformă.</p>
                </div>
                <div class="topbar-actions">
                    <a th:href="@{/admin/properties/pending}" class="pill-btn">Pending approvals</a>
                    <form th:action="@{/logout}" method="post">
                        <button class="pill-btn" type="submit">Logout</button>
                    </form>
                </div>
            </header>

            <section class="hero-content" style="grid-template-columns: repeat(3, 1fr);">
                <div class="mini-stat">
                    <div class="mini-stat-label">Pending today</div>
                    <div class="mini-stat-value" th:text="${pendingCount}">0</div>
                </div>

                <div class="mini-stat">
                    <div class="mini-stat-label">Approved</div>
                    <div class="mini-stat-value" th:text="${approvedCount}">0</div>
                </div>

                <div class="mini-stat">
                    <div class="mini-stat-label">Rejected</div>
                    <div class="mini-stat-value" th:text="${rejectedCount}">0</div>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
