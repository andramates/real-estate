<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="hero-page">
    <div class="hero-card" style="grid-template-columns: 1fr;">
        <main class="hero-main">
            <header class="hero-topbar">
                <div>
                    <h1>My Favorites</h1>
                    <p>Proprietățile salvate de tine.</p>
                </div>
                <div class="topbar-actions">
                    <a th:href="@{/buyer}" class="pill-btn">Dashboard</a>
                </div>
            </header>

            <section class="hero-content" style="grid-template-columns: 1fr;">
                <div class="search-panel">
                    <div th:if="${#lists.isEmpty(favorites)}">
                        <p>Nu ai proprietăți favorite.</p>
                    </div>

                    <div th:each="favorite : ${favorites}" class="mini-stat" style="margin-bottom: 18px;">
                        <div class="mini-stat-label" th:text="${favorite.property.location}">Location</div>
                        <div class="mini-stat-value" th:text="${favorite.property.title}">Title</div>
                        <p style="margin: 12px 0;" th:text="${favorite.property.description}"></p>
                        <p><strong th:text="${favorite.property.price} + ' €'"></strong></p>

                        <div class="auth-actions">
                            <a class="btn btn-secondary" th:href="@{'/properties/' + ${favorite.property.id}}">View</a>
                            <form th:action="@{'/buyer/favorites/remove/' + ${favorite.property.id}}" method="post">
                                <button class="btn btn-primary" type="submit">Remove</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
