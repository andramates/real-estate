<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Property</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <div class="auth-card">
        <section class="auth-left">
            <div class="brand-badge">Seller Area</div>
            <h1 class="auth-hero-title">Publish a new property in a few simple steps.</h1>
            <div class="auth-left-spacer"></div>
            <p class="auth-left-text">Completează informațiile de bază și trimite proprietatea spre aprobare.</p>
        </section>

        <section class="auth-right">
            <div class="auth-form-wrap">
                <h2 class="section-title medium">Add property</h2>

                <form th:action="@{/seller/properties/add}" th:object="${propertyRequest}" method="post">
                    <div class="form-group">
                        <input class="form-control" type="text" th:field="*{title}" placeholder="Property title">
                        <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>

                    <div class="form-group">
                        <textarea class="form-textarea" th:field="*{description}" placeholder="Property description"></textarea>
                        <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="form-group">
                        <input class="form-control" type="number" step="0.01" th:field="*{price}" placeholder="Price">
                        <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="form-group">
                        <input class="form-control" type="text" th:field="*{location}" placeholder="Location">
                        <div class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                    </div>

                    <div class="auth-actions">
                        <button class="btn btn-primary" type="submit">Publish property</button>
                        <a th:href="@{/seller/properties}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </section>
    </div>
</div>
</body>
</html>
